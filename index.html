<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grappling Reference</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600&family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root {
  --bg: #0a0c10;
  --surface: #0f1218;
  --surface2: #13161e;
  --border: #1e2535;
  --text: #dde1ed;
  --text-dim: #8890a8;
  --text-muted: #505870;
  --accent: #e8ff47;
  --accent2: #ff6b35;
  --accent3: #a78bfa;
  --blue: #47c8ff;
  --green: #34d399;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; }

/* ── HEADER ── */
header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 40; }
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; color: var(--accent); }
.stats { display: flex; gap: 20px; align-items: center; }
.stat { text-align: right; }
.stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--accent); }
.stat-label { font-size: 9px; letter-spacing: 1.5px; color: var(--text-muted); text-transform: uppercase; }
.progress-bar-wrap { position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: var(--border); }
.progress-bar { height: 2px; background: var(--accent); transition: width 0.4s; width: 0%; }

/* ── VIEW TABS ── */
.view-tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--surface); padding: 0 20px; overflow-x: auto; }
.view-tab { font-family: 'DM Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; padding: 12px 16px; border: none; border-bottom: 2px solid transparent; background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.view-tab:hover { color: var(--text); }
.view-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── SEARCH + FILTER BAR (shared) ── */
.toolbar { display: flex; align-items: center; gap: 10px; padding: 10px 16px; background: var(--surface); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.search-wrap { flex: 1; min-width: 180px; display: flex; align-items: center; gap: 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 6px 10px; }
.search-wrap input { background: transparent; border: none; color: var(--text); font-family: 'DM Mono', monospace; font-size: 12px; width: 100%; outline: none; }
.search-wrap input::placeholder { color: var(--text-muted); }
.filter-tabs { display: flex; gap: 4px; }
.tab { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; padding: 5px 10px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; border-radius: 2px; transition: all 0.15s; }
.tab:hover { color: var(--text); border-color: var(--text-muted); }
.tab.active { color: var(--bg); background: var(--accent); border-color: var(--accent); }
.toolbar-btn { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; padding: 5px 10px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; border-radius: 2px; transition: all 0.15s; }
.toolbar-btn:hover { color: var(--accent); border-color: var(--accent); }

/* ── REFERENCE VIEW ── */
#referenceView { }
.sections { padding: 12px 16px; }
.section { border: 1px solid var(--border); border-radius: 6px; margin-bottom: 12px; background: var(--surface); overflow: hidden; }
.section-header { display: flex; align-items: center; gap: 12px; padding: 14px 18px; cursor: pointer; user-select: none; transition: background 0.15s; min-height: 52px; }
.section-header:hover { background: var(--surface2); }
.section-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.section-title { font-family: 'Bebas Neue', sans-serif; font-size: 17px; letter-spacing: 2px; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.section-chevron { color: var(--text-muted); font-size: 12px; transition: transform 0.2s; flex-shrink: 0; }
.section.collapsed .section-chevron { transform: rotate(-90deg); }
.section-body { display: block; }
.section.collapsed .section-body { display: none; }
.tree { list-style: none; padding: 0 0 8px; }
.tree-item { }
.node { display: flex; align-items: flex-start; gap: 6px; padding: 4px 16px 4px 8px; transition: background 0.1s; min-height: 32px; }
.node:hover { background: rgba(255,255,255,0.03); }
.node-toggle { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--text-muted); cursor: pointer; flex-shrink: 0; margin-top: 2px; border-radius: 2px; transition: all 0.15s; font-family: 'DM Mono', monospace; }
.node-toggle:hover { background: var(--border); color: var(--text); }
.node-toggle.leaf { cursor: default; color: var(--border); }
.node-toggle.leaf:hover { background: transparent; color: var(--border); }
.node-content { display: flex; align-items: center; gap: 8px; flex: 1; flex-wrap: wrap; }
.node-label { font-size: 12px; color: var(--text-dim); cursor: default; line-height: 1.4; }
.node-label.has-video { color: var(--text); }
.node-actions { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
.btn-video { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.5px; padding: 3px 7px; border: 1px solid var(--accent2); color: var(--accent2); background: transparent; cursor: pointer; border-radius: 2px; transition: all 0.15s; }
.btn-video:hover { background: var(--accent2); color: #000; }
.btn-live { border-color: var(--green) !important; color: var(--green) !important; }
.btn-live:hover { background: var(--green) !important; color: #000 !important; }
.btn-note { font-family: 'DM Mono', monospace; font-size: 12px; padding: 2px 6px; border: 1px solid var(--border); color: var(--text-muted); background: transparent; cursor: pointer; border-radius: 2px; transition: all 0.15s; }
.btn-note:hover { border-color: var(--accent3); color: var(--accent3); }
.btn-note.has-note { border-color: var(--accent3); color: var(--accent3); }
.progress-pill { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.5px; padding: 3px 7px; border: 1px solid var(--border); color: var(--text-muted); background: transparent; cursor: pointer; border-radius: 2px; transition: all 0.15s; text-transform: uppercase; white-space: nowrap; }
.progress-pill:hover { border-color: var(--text-muted); color: var(--text); }
.progress-pill.drilling { border-color: var(--blue); color: var(--blue); }
.progress-pill.learned { border-color: var(--accent); color: var(--accent); background: rgba(232,255,71,0.05); }
.children { list-style: none; }
.tree-item.collapsed > .children { display: none; }
.inline-player { }

/* ── 3D GRAPH VIEW ── */
#graph3dView { position: relative; background: #0e1015; overflow: hidden; }
#g3dCanvas { display: block; }
.g3d-toolbar { display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: rgba(2,4,8,0.9); border-bottom: 1px solid #0a0f1a; }

/* ── SHARED MAP/GRAPH CONTROLS ── */
.mctrl { width: 30px; height: 30px; background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); font-size: 16px; cursor: pointer; border-radius: 3px; transition: all 0.15s; font-family: 'DM Mono', monospace; display: flex; align-items: center; justify-content: center; }
.mctrl:hover { border-color: var(--accent); color: var(--accent); }
.mctrl-label { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; padding: 0 10px; height: 30px; width: auto; }

/* ── NODE POPUP ── */
.node-popup {
  position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
  background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
  padding: 14px 16px; z-index: 200; width: 300px; max-width: 90vw;
  box-shadow: 0 8px 40px rgba(0,0,0,0.7); display: none;
}
.popup-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.popup-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.popup-title { font-family: 'Bebas Neue', sans-serif; font-size: 17px; letter-spacing: 1px; flex: 1; }
.popup-close { background: transparent; border: 1px solid var(--border); color: var(--text-muted); cursor: pointer; width: 22px; height: 22px; border-radius: 2px; font-size: 12px; display: flex; align-items: center; justify-content: center; }
.popup-section { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }
.popup-actions { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin-bottom: 8px; }
.popup-video { display: none; margin-top: 8px; }
.popup-video-inner { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 4px; border: 1px solid var(--border); }
.popup-video-inner iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
.popup-note-area { margin-top: 8px; display: none; }
.popup-note-area textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: 'DM Mono', monospace; font-size: 11px; padding: 6px 8px; border-radius: 3px; resize: vertical; min-height: 60px; outline: none; }
.popup-note-area textarea:focus { border-color: var(--accent3); }
.popup-note-save { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; padding: 4px 10px; border: 1px solid var(--accent3); color: var(--accent3); background: transparent; cursor: pointer; border-radius: 2px; margin-top: 4px; }

/* ── NOTE PANEL ── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 50; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.overlay.active { opacity: 1; pointer-events: all; }
.note-panel { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 20px; z-index: 60; transform: translateY(100%); transition: transform 0.25s; max-height: 70vh; display: flex; flex-direction: column; gap: 12px; }
.note-panel.open { transform: translateY(0); }
.note-panel-title { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 1px; color: var(--accent3); }
.note-panel textarea { flex: 1; min-height: 120px; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: 'DM Mono', monospace; font-size: 12px; padding: 10px; border-radius: 3px; resize: none; outline: none; }
.note-panel textarea:focus { border-color: var(--accent3); }
.note-panel-actions { display: flex; gap: 8px; }
.btn-save-note { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; padding: 8px 16px; border: none; background: var(--accent3); color: #000; cursor: pointer; border-radius: 2px; }
.btn-clear-note { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; padding: 8px 16px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; border-radius: 2px; }


/* ── 3D NETWORK GRAPH TOOLBAR ── */
.g3d-tb-btn {
  height: 30px;
  padding: 0 12px;
  background: transparent;
  border: 1px solid transparent;
  border-radius: 5px;
  color: #4a5568;
  font-family: 'Barlow Condensed', 'DM Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.g3d-tb-btn:hover { color: #c4cdd8; background: #181c26; }
.g3d-tb-btn.active { color: #000; background: var(--accent); border-color: var(--accent); }

.g3d-opt-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  font-family: 'Barlow Condensed', monospace;
  font-size: 13px;
  color: #c4cdd8;
  letter-spacing: 0.5px;
}
.g3d-opt-row:last-child { border-bottom: none; }

.g3d-toggle { position:relative;width:32px;height:17px;cursor:pointer;display:inline-block; }
.g3d-toggle input { opacity:0;width:0;height:0;position:absolute; }
.g3d-toggle-track { position:absolute;inset:0;background:#1e2330;border:1px solid rgba(255,255,255,0.08);border-radius:9px;transition:all 0.2s; }
.g3d-toggle input:checked + .g3d-toggle-track { background:var(--accent);border-color:var(--accent); }
.g3d-toggle-track::after { content:'';position:absolute;left:2px;top:50%;transform:translateY(-50%);width:11px;height:11px;background:#4a5568;border-radius:50%;transition:all 0.2s; }
.g3d-toggle input:checked + .g3d-toggle-track::after { left:calc(100% - 13px);background:#000; }

/* ── MOBILE ── */
@media (max-width: 768px) {
  /* Header: stack logo and stats */
  header { flex-wrap: wrap; gap: 8px; padding: 10px 14px; }
  .logo { font-size: 22px; }
  .stats { gap: 14px; }
  .stat-num { font-size: 18px; }

  /* Toolbar: let filter buttons wrap */
  .toolbar { gap: 6px; padding: 8px 10px; }
  .search-wrap { min-width: 140px; }
  .filter-tabs { gap: 3px; }
  .tab { font-size: 9px; padding: 4px 7px; }
  .toolbar-btn { font-size: 9px; padding: 4px 7px; }

  /* Reference: tighter section padding */
  .sections { padding: 8px 8px; }
  .section-header { padding: 10px 12px; gap: 8px; }
  .section-title { font-size: 14px; }
  .node { padding: 4px 8px 4px 4px; }

  /* 3D detail panel: bottom-sheet on mobile */
  #g3dDetail { width: 100% !important; border-left: none !important; border-top: 1px solid rgba(255,255,255,0.06); top: auto !important; max-height: 55vh !important; border-radius: 14px 14px 0 0; }
  #g3dLegend { right: 16px !important; }

  /* 3D bottom toolbar: compact */
  #g3dToolbar { left: 8px !important; right: 8px !important; transform: none !important; bottom: 10px !important; max-width: 100% !important; gap: 1px !important; padding: 4px !important; }
  .g3d-tb-btn { font-size: 10px; padding: 0 8px; height: 28px; }

  /* 3D options panel: full-width */
  #g3dOptions { left: 8px !important; right: 8px !important; transform: none !important; min-width: 0 !important; }

  /* Note panel: more padding on mobile */
  .note-panel { padding: 14px; }

  /* Node popup: wider on mobile */
  .node-popup { width: calc(100vw - 24px); }
}

/* Diagnostics panel */
.diag-section { margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,0.04); }
.diag-section:last-child { border-bottom:none; }
.diag-label { color:#4a5568;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px; }
.diag-val { color:#c9d1d9;margin-bottom:2px; }
.diag-err { color:#f85149;margin-bottom:4px;white-space:pre-wrap;font-size:10px; }
.diag-warn { color:#d29922;margin-bottom:2px;font-size:10px; }
#diagToggle:hover { border-color:rgba(255,255,255,0.25);color:#8892a4; }

</style>
</head>
<body>

<header>
  <div class="logo">Grappling</div>
  <div class="stats">
    <div class="stat"><div class="stat-num" id="learnedCount">0</div><div class="stat-label">Learned</div></div>
    <div class="stat"><div class="stat-num" id="totalCount">0</div><div class="stat-label">Total</div></div>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
  <button id="diagToggle" style="background:none;border:1px solid rgba(255,255,255,0.1);color:#4a5568;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;padding:4px 10px;border-radius:4px;cursor:pointer;text-transform:uppercase;">Diag</button>
</header>

<div class="view-tabs">
  <button class="view-tab active" data-view="reference">📋 Reference</button>
  <button class="view-tab" data-view="graph3d">⬡ 3D Graph</button>
</div>

<!-- ══ REFERENCE VIEW ══════════════════════════════════════════════════════ -->
<div id="referenceView">
  <div class="toolbar">
    <div class="search-wrap">
      <span style="color:var(--text-muted);font-size:12px;">⌕</span>
      <input type="text" id="refSearch" placeholder="Search techniques...">
    </div>
    <div class="filter-tabs">
      <button class="tab active" data-filter="all">All</button>
      <button class="tab" data-filter="drilling">Drilling</button>
      <button class="tab" data-filter="learned">Learned</button>
      <button class="tab" data-filter="video">Video</button>
      <button class="tab" data-filter="builtout">Built-out</button>
    </div>
    <button class="toolbar-btn" id="refCollapseAll">Collapse All</button>
    <button class="toolbar-btn" id="refExpandAll">Expand All</button>
  </div>
  <div class="sections" id="sections"></div>
  <div id="refEmpty" style="display:none;text-align:center;padding:60px 20px;color:var(--text-muted);font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:1px;"></div>
</div>



<!-- ══ 3D GRAPH ════════════════════════════════════════════════════════════ -->
<div
  id="graph3dView" style="display:none; flex-direction:column; position:relative; height:calc(100vh - 97px);">
  <!-- Top toolbar -->
  <div class="toolbar" style="position:relative;z-index:20;flex-shrink:0;">
    <div class="filter-tabs">
      <button class="tab active" data-g3dtop="all">All</button>
      <button class="tab" data-g3dtop="drilling">Drilling</button>
      <button class="tab" data-g3dtop="learned">Learned</button>
    </div>
    <button class="toolbar-btn" id="g3dCollapseAllTop">Collapse All</button>
    <button class="toolbar-btn" id="g3dExpandAllTop">Expand All</button>
  </div>
  <!-- Canvas fills everything -->
  <canvas id="g3dCanvas" style="position:absolute;inset:0;width:100%;height:100%;display:block;z-index:0;"></canvas>

  <!-- Vignette -->
  <div style="position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 50%,rgba(14,16,21,0.6) 100%);pointer-events:none;z-index:1;"></div>

  <!-- Bottom toolbar -->
  <div id="g3dToolbar" style="position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:2px;background:rgba(18,21,28,0.92);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:5px 6px;backdrop-filter:blur(16px);z-index:10;box-shadow:0 8px 32px rgba(0,0,0,0.5);max-width:calc(100vw - 24px);overflow-x:auto;">
    <div style="display:flex;align-items:center;gap:6px;background:#181c26;border:1px solid rgba(255,255,255,0.08);border-radius:5px;padding:0 10px;height:30px;">
      <span style="color:#4a5568;font-size:11px;">⌕</span>
      <input type="text" id="g3dSearch" placeholder="search..." style="background:none;border:none;outline:none;color:#c4cdd8;font-family:'DM Mono',monospace;font-size:11px;width:130px;">
    </div>
    <div style="width:1px;height:22px;background:rgba(255,255,255,0.08);margin:0 4px;"></div>
    <button class="g3d-tb-btn active" data-status="all">All</button>
    <button class="g3d-tb-btn" data-status="learned">My Game</button>
    <button class="g3d-tb-btn" data-status="drilling">Drilling</button>
    <div style="width:1px;height:22px;background:rgba(255,255,255,0.08);margin:0 4px;"></div>
    <button class="g3d-tb-btn" id="g3dBuiltOutBtn">Built-out</button>
    <div style="width:1px;height:22px;background:rgba(255,255,255,0.08);margin:0 4px;"></div>
    <button class="g3d-tb-btn" id="g3dCollapseAll">Collapse</button>
    <button class="g3d-tb-btn" id="g3dExpandAll">Expand</button>
    <div style="width:1px;height:22px;background:rgba(255,255,255,0.08);margin:0 4px;"></div>
    <button class="g3d-tb-btn" id="g3dReset">Reset</button>
    <button class="g3d-tb-btn" id="g3dOptionsBtn">⚙ Options</button>
  </div>

  <!-- Options popover -->
  <div id="g3dOptions" style="display:none;position:absolute;bottom:70px;left:50%;transform:translateX(-50%);background:rgba(18,21,28,0.97);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:14px 18px;z-index:20;backdrop-filter:blur(20px);box-shadow:0 8px 40px rgba(0,0,0,0.6);min-width:300px;">
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:2px;color:#4a5568;text-transform:uppercase;margin-bottom:8px;">Options</div>
    <div class="g3d-opt-row"><label>Hub rings</label><label class="g3d-toggle"><input type="checkbox" id="g3dOptRings" checked><span class="g3d-toggle-track"></span></label></div>
    <div class="g3d-opt-row"><label>Top hub labels</label><label class="g3d-toggle"><input type="checkbox" id="g3dOptLabels" checked><span class="g3d-toggle-track"></span></label></div>
    <div class="g3d-opt-row"><label>Top hubs only</label><label class="g3d-toggle"><input type="checkbox" id="g3dOptHubOnly"><span class="g3d-toggle-track"></span></label></div>
    <div class="g3d-opt-row"><label>Built-out only</label><label class="g3d-toggle"><input type="checkbox" id="g3dOptBuiltOut"><span class="g3d-toggle-track"></span></label></div>
    <div class="g3d-opt-row"><label>Edge opacity</label><div style="display:flex;align-items:center;gap:8px;"><input type="range" id="g3dOptEdge" min="0" max="100" value="30" style="width:80px;accent-color:var(--accent);"><span id="g3dOptEdgeVal" style="font-size:9px;color:#4a5568;width:28px;">30%</span></div></div>
    <div class="g3d-opt-row"><label>Auto-rotate</label><label class="g3d-toggle"><input type="checkbox" id="g3dOptRotate" checked><span class="g3d-toggle-track"></span></label></div>

const STATE = {
  progress: {},

  currentNoteKey: null,
  currentFilter: 'all',
  totalNodes: 0,

};

function saveState() {
  try {
    localStorage.setItem('grapplingProgress', JSON.stringify(STATE.progress));
    localStorage.setItem('grapplingNotes', JSON.stringify(STATE.notes));
  } catch(e) {}
}

function loadState() {
  try {
    const p = localStorage.getItem('grapplingProgress');
    const n = localStorage.getItem('grapplingNotes');
    if (p) STATE.progress = JSON.parse(p);
    if (n) STATE.notes = JSON.parse(n);
  } catch(e) {}
}

function makeKey(sectionTitle, text) {
  return (sectionTitle + '|' + text).toLowerCase().replace(/\s+/g, '_');
}
function makePathKey(parentKey, text) {
  return parentKey + '|' + text.toLowerCase().replace(/\s+/g, '_');
}

const EXPANDED = new Set();
let SELECTED_NODE = null; // shared across all tabs: { key, label, section }
function isStubNode(hasVideo, childCount) { return !hasVideo && childCount === 0; }
const SCHEMA_NAMES = new Set(['Setups / Entries','Control','Offence','Defence / Escapes',
  'Submissions','Offensive transitions','Defence','Instructional video','Live video',
  'Attacker','Defender','Passer','Guard player','You','Opponent','Initiative',
  'Defensive','Entries','Passes','Notes','Subtopic','Main topic']);

function setSelectedNode(key, label, section) {
  SELECTED_NODE = key ? { key, label, section } : null;
}

// Called when switching tabs - syncs the selected node into the new tab
function syncSelectedToTab(view) {
  if (!SELECTED_NODE) return;
  const { key, label, section } = SELECTED_NODE;

  if (view === 'reference') {
    // Expand the containing section and scroll/flash the node
    setTimeout(() => {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('collapsed'));
      setTimeout(() => {
        const needle = label.trim().toLowerCase().replace(/^[-•]\s*/, '').slice(0, 20);
        let found = null;
        document.querySelectorAll('.node-label').forEach(lbl => {
          if (!found && lbl.textContent.trim().replace(/^[-•]\s*/, '').toLowerCase().startsWith(needle.slice(0, 15))) found = lbl;
        });
        if (found) {
          // Expand all ancestor tree-items so the node is visible
          let ancestor = found.closest('.tree-item');
          while (ancestor) {
            if (ancestor.classList.contains('collapsed')) {
              ancestor.classList.remove('collapsed');
              const tog = ancestor.querySelector(':scope > .node > .node-toggle');
              if (tog && !tog.classList.contains('leaf')) tog.textContent = '−';
              if (ancestor.dataset.key) EXPANDED.add(ancestor.dataset.key);
            }
            ancestor = ancestor.parentElement.closest('.tree-item');
          }
          found.scrollIntoView({ behavior: 'smooth', block: 'center' });
          found.style.background = 'rgba(232,255,71,0.15)';
          found.style.borderRadius = '3px';
          found.style.padding = '0 3px';
          setTimeout(() => { found.style.background = ''; found.style.padding = ''; }, 2500);
        }
      }, 200);
    }, 100);

    // Only expand the SECTION that contains this node — no deep expansion
    // Deep expansion causes floating disconnected child nodes
    setTimeout(() => {
      // Find which section key this node belongs to, expand only that section node
      const sectionKey = makeKey(section, section);
      if (!EXPANDED.has(sectionKey)) {
        EXPANDED.add(sectionKey);
        if (window.cmSyncExpanded) window.cmSyncExpanded();
      }
      // Flash the section node to indicate where we are
      const reg = window._cmReg;
      if (reg && reg[sectionKey]) {
        const bg = reg[sectionKey].bg;
        const origStroke = bg.getAttribute('stroke');
        const origWidth = bg.getAttribute('stroke-width');
        bg.setAttribute('stroke', '#e8ff47');
        bg.setAttribute('stroke-width', '2.5');
        setTimeout(() => { bg.setAttribute('stroke', origStroke); bg.setAttribute('stroke-width', origWidth); }, 2000);
      }
    }, 350);

  } else if (view === 'graph3d') {
    // Softly highlight the matching node — don't open detail panel
    setTimeout(() => {
      if (window._g3dHighlightByLabel) window._g3dHighlightByLabel(label);
    }, 400);
  }
}

function toggleExpanded(key) {
  if (EXPANDED.has(key)) {
    EXPANDED.delete(key);
    // Remove all descendants from EXPANDED (path-aware: descendants share key prefix)
    const prefix = key + '|';
    EXPANDED.forEach(k => { if (k.startsWith(prefix)) EXPANDED.delete(k); });
  } else {
    EXPANDED.add(key);
  }
  if(window.cmSyncExpanded) window.cmSyncExpanded();
  if(window.g3dSyncExpanded) window.g3dSyncExpanded();
  if(window.refSyncExpanded) window.refSyncExpanded();
}

function refSyncExpanded() {
  // Sync section-level collapse
  document.querySelectorAll('.section[data-section]').forEach(div => {
    const title = div.dataset.section;
    const key = makeKey(title, title);
    const shouldBeExpanded = EXPANDED.has(key);
    if (shouldBeExpanded) div.classList.remove('collapsed');
    else div.classList.add('collapsed');
  });
  // Sync node-level collapse in tree items (require data-key attribute)
  document.querySelectorAll('.tree-item[data-key]').forEach(li => {
    const key = li.dataset.key;
    const tog = li.querySelector(':scope > .node > .node-toggle');
    if (!tog || tog.classList.contains('leaf')) return;
    const shouldBeExpanded = EXPANDED.has(key);
    if (shouldBeExpanded) { li.classList.remove('collapsed'); tog.textContent = '−'; }
    else { li.classList.add('collapsed'); tog.textContent = '+'; }
  });
}

function updateStats() {
  let learned = 0;
  for (const v of Object.values(STATE.progress)) {
    if (v === 'learned') learned++;
  }
  STATE.learnedNodes = learned;
  document.getElementById('learnedCount').textContent = learned;
  document.getElementById('totalCount').textContent = STATE.totalNodes;
  const pct = STATE.totalNodes > 0 ? (learned / STATE.totalNodes * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
}

    refreshAllViews();
  });
  na.appendChild(ns);
  popupEl.appendChild(na);
}

// ─── REFERENCE VIEW ──────────────────────────────────────────────────────────
function buildNode(node, sectionTitle, depth, parentUl, parentKey) {
  // Hoist video URLs from marker children onto parent technique node
  if (node.c && node.c.length) {
    node.c.forEach(ch => {
      if (ch.t === 'Instructional video' && ch.v && !node.v) node.v = ch.v;
      if (ch.t === 'Live video' && ch.l && !node.l) node.l = ch.l;
    });
    node.c = node.c.filter(ch =>
      !((ch.t === 'Instructional video') || (ch.t === 'Live video'))
    );
  }
  const li = document.createElement('li');
  li.className = 'tree-item';
  const key = parentKey ? makePathKey(parentKey, node.t) : makeKey(sectionTitle, node.t);
  li.dataset.key = key;
  li.dataset.hasVideo = (node.v || node.l) ? '1' : '0';
  li.dataset.schema = SCHEMA_NAMES.has(node.t.trim()) ? '1' : '0';

  const nodeDiv = document.createElement('div');
  nodeDiv.className = 'node';
  const indent = depth * 20;
  nodeDiv.style.paddingLeft = (indent + 8) + 'px';

  const hasChildren = node.c && node.c.length > 0;
  if (hasChildren) li.classList.add('collapsed');  // open one level at a time
  const toggle = document.createElement('div');
  toggle.className = hasChildren ? 'node-toggle' : 'node-toggle leaf';
  toggle.textContent = hasChildren ? '+' : '·';

  const content = document.createElement('div');
  content.className = 'node-content';

  // Transition parse warning: expect "ContextLabel → ExactCanonicalNodeName"
  if (node.t && node.t.includes('\u2192')) {
    const parts = node.t.split('\u2192');
    if (parts.length !== 2 || !parts[0].trim() || !parts[1].trim()) {
      console.warn('WARN: malformed transition: "' + node.t + '" at node "' + (parentKey || sectionTitle) + '"');
    }
  }

  const label = document.createElement('span');
  label.className = (node.v || node.l) ? 'node-label has-video' : 'node-label';
  label.textContent = node.t;
  content.appendChild(label);

  const actions = document.createElement('div');
  actions.className = 'node-actions';

  // Video buttons
  if (node.v) {
    const vBtn = document.createElement('button');
    vBtn.className = 'btn-video';
    vBtn.textContent = '📖 Instructional';
    vBtn.addEventListener('click', e => {
      e.stopPropagation();
      const vidId = node.v.split('/').pop().split('?')[0];
      const existing = li.querySelector('.inline-player-i');
      if (existing) { existing.remove(); vBtn.textContent = '📖 Instructional'; return; }
      const pw = document.createElement('div');
      pw.className = 'inline-player inline-player-i';
      pw.style.cssText = 'padding:8px 0 4px ' + (indent+28) + 'px;';
      pw.innerHTML = '<div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:4px;border:1px solid var(--border);"><iframe src="https://www.youtube.com/embed/'+vidId+'?autoplay=1" style="position:absolute;top:0;left:0;width:100%;height:100%;border:0;" allowfullscreen allow="autoplay; encrypted-media"></iframe></div>';
      li.appendChild(pw);
      vBtn.textContent = '✕ Close';
    });
    actions.appendChild(vBtn);
  }

  if (node.l) {
    const lBtn = document.createElement('button');
    lBtn.className = 'btn-video btn-live';
    lBtn.textContent = '🎥 Live';
    lBtn.addEventListener('click', e => {
      e.stopPropagation();
      const vidId = node.l.split('/').pop().split('?')[0];
      const existing = li.querySelector('.inline-player-l');
      if (existing) { existing.remove(); lBtn.textContent = '🎥 Live'; return; }
      const pw = document.createElement('div');
      pw.className = 'inline-player inline-player-l';
      pw.style.cssText = 'padding:8px 0 4px ' + (indent+28) + 'px;';
      pw.innerHTML = '<div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:4px;border:1px solid var(--border);"><iframe src="https://www.youtube.com/embed/'+vidId+'?autoplay=1" style="position:absolute;top:0;left:0;width:100%;height:100%;border:0;" allowfullscreen allow="autoplay; encrypted-media"></iframe></div>';
      li.appendChild(pw);
      lBtn.textContent = '✕ Close';
    });
    actions.appendChild(lBtn);
  }

  // Progress pill
  const prog = document.createElement('div');
  prog.className = 'progress-pill';
  const curProg = STATE.progress[key] || 'none';
  if (curProg === 'drilling') { prog.classList.add('drilling'); prog.textContent = 'Drilling'; }
  else if (curProg === 'learned') { prog.classList.add('learned'); prog.textContent = 'Learned'; }
  else prog.textContent = 'Track';
  prog.addEventListener('click', e => {
    e.stopPropagation();
    const cur = STATE.progress[key] || 'none';
    const next = {none:'drilling',drilling:'learned',learned:'none'}[cur];
    if (next === 'none') { delete STATE.progress[key]; prog.className = 'progress-pill'; prog.textContent = 'Track'; }
    else if (next === 'drilling') { STATE.progress[key] = 'drilling'; prog.className = 'progress-pill drilling'; prog.textContent = 'Drilling'; }
    else { STATE.progress[key] = 'learned'; prog.className = 'progress-pill learned'; prog.textContent = 'Learned'; }
    li.dataset.progress = next;
    saveState(); updateStats(); refreshAllViews();
  });
  li.dataset.progress = curProg;
  actions.appendChild(prog);

  // Note button
  const noteBtn = document.createElement('button');
  noteBtn.className = STATE.notes[key] ? 'btn-note has-note' : 'btn-note';
  noteBtn.textContent = '✎';
  noteBtn.addEventListener('click', e => { e.stopPropagation(); openNotePanel(key, node.t); });
  li.dataset.hasNote = STATE.notes[key] ? '1' : '0';
  actions.appendChild(noteBtn);

  content.appendChild(actions);
  nodeDiv.appendChild(toggle);
  nodeDiv.appendChild(content);
  li.appendChild(nodeDiv);

  if (hasChildren) {
    const childUl = document.createElement('ul');
    childUl.className = 'children';
    node.c.forEach(child => buildNode(child, sectionTitle, depth + 1, childUl, key));
    li.appendChild(childUl);
    toggle.addEventListener('click', e => {
      e.stopPropagation();
      li.classList.toggle('collapsed');
      const isNowCollapsed = li.classList.contains('collapsed');
      toggle.textContent = isNowCollapsed ? '+' : '−';
      if (isNowCollapsed) EXPANDED.delete(key); else EXPANDED.add(key);
      if(window.cmSyncExpanded) window.cmSyncExpanded();
      if(window.g3dSyncExpanded) window.g3dSyncExpanded();
    });
    nodeDiv.addEventListener('click', () => {
      setSelectedNode(key, node.t, sectionTitle);
      if (window._g3dHighlightByLabel) window._g3dHighlightByLabel(node.t);
      li.classList.toggle('collapsed');
      const isNowCollapsed = li.classList.contains('collapsed');
      toggle.textContent = isNowCollapsed ? '+' : '−';
      if (isNowCollapsed) EXPANDED.delete(key); else EXPANDED.add(key);
      if(window.cmSyncExpanded) window.cmSyncExpanded();
      if(window.g3dSyncExpanded) window.g3dSyncExpanded();
    });
  }

  STATE.totalNodes++;
  parentUl.appendChild(li);
}

function buildSections() {
  const container = document.getElementById('sections');
  container.innerHTML = '';
  STATE.totalNodes = 0;
  SECTIONS.forEach((section, si) => {
    const div = document.createElement('div');
    div.className = 'section collapsed';
    div.dataset.section = section.title;
    const header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML = '<div class="section-dot" style="background:'+section.color+'"></div><div class="section-title">'+section.title+'</div><div class="section-chevron">&#9662;</div>';
    header.addEventListener('click', e => {
      div.classList.toggle('collapsed');
      const sectionKey = makeKey(section.title, section.title);
      if (div.classList.contains('collapsed')) EXPANDED.delete(sectionKey); else EXPANDED.add(sectionKey);
      if(window.cmSyncExpanded) window.cmSyncExpanded();
      if(window.g3dSyncExpanded) window.g3dSyncExpanded();
      // Don't call refSyncExpanded here - we ARE the ref tree, would cause loop
    });
    const body = document.createElement('div');
    body.className = 'section-body';
    const ul = document.createElement('ul');
    ul.className = 'tree';
    const sectionKey = makeKey(section.title, section.title);
    section.nodes.forEach(node => buildNode(node, section.title, 0, ul, sectionKey));
    body.appendChild(ul);
    div.appendChild(header);
    div.appendChild(body);
    container.appendChild(div);
  });
  updateStats();
}

function markBuiltOut() {
  const items = Array.from(document.querySelectorAll('.tree-item'));
  items.reverse().forEach(li => {
    const hasVideo = li.dataset.hasVideo === '1';
    const children = li.querySelectorAll(':scope > .children > .tree-item');
    const hasChildren = children.length > 0;
    const anyChildBuilt = hasChildren && Array.from(children).some(c => c.dataset.builtout === '1');
    const nonSchemaCount = hasChildren
      ? Array.from(children).filter(c => c.dataset.schema === '0').length
      : 0;
    li.dataset.builtout = (hasVideo || anyChildBuilt || nonSchemaCount >= 3) ? '1' : '0';
  });
}

// ─── NOTE PANEL ───────────────────────────────────────────────────────────────
function openNotePanel(key, title) {
  STATE.currentNoteKey = key;
  document.getElementById('notePanelTitle').textContent = title;
  document.getElementById('noteTextarea').value = STATE.notes[key] || '';
  document.getElementById('notePanel').classList.add('open');

document.getElementById('noteSaveBtn').addEventListener('click', () => {

// ─── Ancestor propagation helper ──────────────────────────────────────────────
function revealAncestorItems() {
  document.querySelectorAll('.tree-item').forEach(li => {
    if (li.style.display !== 'none') {
      let a = li.parentElement.closest('.tree-item');
      while (a) { a.style.display = ''; a = a.parentElement.closest('.tree-item'); }
    }
  });
}

// ─── SEARCH (Reference) ───────────────────────────────────────────────────────
let _refSearchTimer;
document.getElementById('refSearch').addEventListener('input', function() {
  const self = this;
  clearTimeout(_refSearchTimer);
  _refSearchTimer = setTimeout(function() {
  const q = self.value.toLowerCase().trim();
  document.querySelectorAll('.tree-item').forEach(li => {
    const label = li.querySelector('.node-label');
    if (!label) return;
    const match = !q || label.textContent.toLowerCase().includes(q);
    li.style.display = match ? '' : 'none';
  });
  if (q) revealAncestorItems();
  let anyVisible = false;
  document.querySelectorAll('.section').forEach(sec => {
    const visible = Array.from(sec.querySelectorAll('.tree-item')).some(li => li.style.display !== 'none');
    sec.style.display = visible ? '' : 'none';
    if (visible) anyVisible = true;
    if (q && visible) sec.classList.remove('collapsed');
  });
  const emptyEl = document.getElementById('refEmpty');
  if (q && !anyVisible) { emptyEl.textContent = 'No results for "' + q + '"'; emptyEl.style.display = 'block'; }
  else { emptyEl.style.display = 'none'; }
  }, 200);
});

// ─── FILTER (Reference) ──────────────────────────────────────────────────────
document.querySelectorAll('.tab[data-filter]').forEach(tab => {
  if (!tab.classList.contains('cm-filter') && !tab.classList.contains('g3d-filter')) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.tab[data-filter]:not(.cm-filter):not(.g3d-filter)').forEach(t => t.classList.remove('active'));
      this.classList.add('active');
      applyRefFilter(this.dataset.filter);
    });
  }
});
function applyRefFilter(filter) {
  STATE.currentFilter = filter;
  document.querySelectorAll('.tree-item').forEach(li => {
    let show = true;
    if (filter === 'drilling') show = li.dataset.progress === 'drilling';
    else if (filter === 'learned') show = li.dataset.progress === 'learned';
    else if (filter === 'video') show = li.dataset.hasVideo === '1';
    else if (filter === 'builtout') show = li.dataset.builtout === '1';
    li.style.display = show ? '' : 'none';
  });
  if (filter !== 'all') revealAncestorItems();
  let anyVisible = false;
  document.querySelectorAll('.section').forEach(sec => {
    const visible = Array.from(sec.querySelectorAll('.tree-item')).some(li => li.style.display !== 'none');
    sec.style.display = visible ? '' : 'none';
    if (visible) anyVisible = true;
    if (filter !== 'all' && visible) sec.classList.remove('collapsed');
  });
  const emptyEl = document.getElementById('refEmpty');
  if (filter !== 'all' && !anyVisible) {
    const labels = {drilling:'No techniques marked as Drilling yet',learned:'No techniques marked as Learned yet',video:'No video content found',builtout:'No built-out positions found'};
    emptyEl.textContent = labels[filter] || 'No matching items';
    emptyEl.style.display = 'block';
  } else { emptyEl.style.display = 'none'; }
}

document.getElementById('refCollapseAll').addEventListener('click', () => {
  EXPANDED.clear();
  document.querySelectorAll('.section').forEach(s => s.classList.add('collapsed'));
  document.querySelectorAll('.tree-item').forEach(li => {
    if (li.querySelector(':scope > .children')) {
      li.classList.add('collapsed');
      const tog = li.querySelector(':scope > .node > .node-toggle');
      if (tog && !tog.classList.contains('leaf')) tog.textContent = '+';
    }
  });
  if(window.cmSyncExpanded) window.cmSyncExpanded();
  if(window.g3dSyncExpanded) window.g3dSyncExpanded();
});
document.getElementById('refExpandAll').addEventListener('click', () => {
  const addAll = (nd, pk) => {
    const k = makePathKey(pk, nd.t);
    if (nd.c && nd.c.length) { EXPANDED.add(k); nd.c.forEach(c => addAll(c, k)); }
  };
  SECTIONS.forEach(s => { const sk = makeKey(s.title, s.title); EXPANDED.add(sk); s.nodes.forEach(n => addAll(n, sk)); });
  refSyncExpanded();
  if(window.cmSyncExpanded) window.cmSyncExpanded();
  if(window.g3dSyncExpanded) window.g3dSyncExpanded();
});

function switchToTab(view) {
  document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
  const btn = document.querySelector('[data-view="'+view+'"]');
  if (btn) btn.classList.add('active');
  document.getElementById('referenceView').style.display = view === 'reference' ? 'block' : 'none';
  document.getElementById('graph3dView').style.display = view === 'graph3d' ? 'flex' : 'none';
  document.getElementById('graph3dView').style.flexDirection = 'column';
  if (view === 'graph3d') { requestAnimationFrame(() => requestAnimationFrame(initGraph3D)); }
  // Sync selected node into the new tab
  syncSelectedToTab(view);
  window.scrollTo(0, 0);
}
document.querySelectorAll('.view-tab').forEach(tab => {
  tab.addEventListener('click', function() { switchToTab(this.dataset.view); });
});
function switchToReferenceNode(text) {
  switchToTab('reference');
  // Reset filter to ALL so the target node is not hidden
  applyRefFilter('all');
  document.querySelectorAll('.tab[data-filter]:not(.cm-filter):not(.g3d-filter)').forEach(t => t.classList.remove('active'));
  const allTab = document.querySelector('.tab[data-filter="all"]:not(.cm-filter):not(.g3d-filter)');
  if (allTab) allTab.classList.add('active');
  document.querySelectorAll('.section').forEach(s => s.classList.remove('collapsed'));
  setTimeout(() => {
    let found = null;
    const needle = text.trim().toLowerCase().slice(0, 20);
    document.querySelectorAll('.node-label').forEach(lbl => {
      if (!found && lbl.textContent.trim().replace(/^[-•]\s*/,'').toLowerCase().startsWith(needle.slice(0,15))) found = lbl;
    });
    if (found) {
      // Expand all ancestor tree-items so the node is visible
      let ancestor = found.closest('.tree-item');
      while (ancestor) {
        if (ancestor.classList.contains('collapsed')) {
          ancestor.classList.remove('collapsed');
          const tog = ancestor.querySelector(':scope > .node > .node-toggle');
          if (tog && !tog.classList.contains('leaf')) tog.textContent = '−';
          if (ancestor.dataset.key) EXPANDED.add(ancestor.dataset.key);
        }
        ancestor = ancestor.parentElement.closest('.tree-item');
      }
      found.scrollIntoView({behavior:'smooth',block:'center'});
      found.style.background = 'rgba(232,255,71,0.2)';
      found.style.borderRadius = '3px'; found.style.padding = '0 3px';
      setTimeout(() => { found.style.background=''; found.style.padding=''; }, 2500);
    }
  }, 300);
}

// ─── REFRESH (called after state changes) ────────────────────────────────────
function refreshAllViews() {
  // Refresh reference progress pills
  document.querySelectorAll('.tree-item').forEach(li => {
    const key = li.dataset.key;
    if (!key) return;
    const prog = STATE.progress[key] || 'none';
    li.dataset.progress = prog;
    const pill = li.querySelector('.progress-pill');
    if (pill) {
      pill.className = 'progress-pill' + (prog !== 'none' ? ' '+prog : '');
      pill.textContent = {none:'Track',drilling:'Drilling',learned:'Learned'}[prog];
    }
    const nb = li.querySelector('.btn-note');
    if (nb) nb.className = STATE.notes[key] ? 'btn-note has-note' : 'btn-note';
    li.dataset.hasNote = STATE.notes[key] ? '1' : '0';
  });
  // Re-apply current filter so items leaving a state disappear immediately
  if (STATE.currentFilter && STATE.currentFilter !== 'all') applyRefFilter(STATE.currentFilter);
  // Update 3D node colours if initialized
  if (window.g3dRefreshNodes) window.g3dRefreshNodes();
}

      const s=p[n.key]||'none';
      n.status=s==='learned'?'learned':s==='drilling'?'drilling':'none';
    });
  }

  function computeW3d(nodes, edges) {
    const inn={},out={};
    nodes.forEach(n=>{inn[n.id]=0;out[n.id]=0;});
    edges.forEach(e=>{inn[e.target]=(inn[e.target]||0)+e.weight;out[e.source]=(out[e.source]||0)+e.weight;});
    nodes.forEach(n=>{
      n._in=inn[n.id]||0; n._out=out[n.id]||0;
      const di=n.depth===1?4:n.depth===2?2:1;
      n._w=n._in*1.5+n._out+di*2;
      n._r=Math.max(1.5,1.5+Math.sqrt(n._w)*4.2);
    });
  }

  function nodeCol3d(n,THREE){
    if(n.status==='learned') return new THREE.Color(0xe8ff47);
    if(n.status==='drilling'){const c=new THREE.Color(SECT_HEX3[n.section_idx]||0x445566);c.lerp(new THREE.Color(0x47c8ff),0.5);return c;}
    const c=new THREE.Color(SECT_HEX3[n.section_idx]||0x445566);c.multiplyScalar(0.72);return c;
  }

  function randSph3d(r){const u=Math.random(),v=Math.random(),t=2*Math.PI*u,p=Math.acos(2*v-1);return[r*Math.sin(p)*Math.cos(t),r*Math.sin(p)*Math.sin(t),r*Math.cos(p)];}

  function runForce3d(nodes,edges,steps){
    const byId={};nodes.forEach(n=>byId[n.id]=n);
    const rep=4000,k=90,att=0.004,damp=0.78;
    for(let s=0;s<steps;s++){
      for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){
        const a=nodes[i],b=nodes[j],dx=b.x-a.x,dy=b.y-a.y,dz=b.z-a.z;
        const d2=dx*dx+dy*dy+dz*dz||0.01,d=Math.sqrt(d2),f=rep/d2,ux=dx/d,uy=dy/d,uz=dz/d;
        a.vx-=f*ux;a.vy-=f*uy;a.vz-=f*uz;b.vx+=f*ux;b.vy+=f*uy;b.vz+=f*uz;
      }
      edges.forEach(e=>{
        const a=byId[e.source],b=byId[e.target];if(!a||!b)return;
        const dx=b.x-a.x,dy=b.y-a.y,dz=b.z-a.z,d=Math.sqrt(dx*dx+dy*dy+dz*dz)||0.01;
        const ideal=k/Math.sqrt(e.weight||1),f=(d-ideal)*att*e.weight,ux=dx/d,uy=dy/d,uz=dz/d;
        a.vx+=f*ux;a.vy+=f*uy;a.vz+=f*uz;b.vx-=f*ux;b.vy-=f*uy;b.vz-=f*uz;
      });
      nodes.forEach(n=>{
        n.vx-=n.x*0.001;n.vy-=n.y*0.001;n.vz-=n.z*0.001;
        n.vx*=damp;n.vy*=damp;n.vz*=damp;
        n.x+=n.vx;n.y+=n.vy;n.z+=n.vz;
        const nd=nodeMap3d[n.id];if(nd){nd.x=n.x;nd.y=n.y;nd.z=n.z;}
        const m=meshMap3d[n.id];if(m)m.position.set(n.x,n.y,n.z);
      });
    }
  }

  function syncEdges3d(activeIds){
    edgeMeshes3d.forEach(e=>{
      const src=nodeMap3d[e.source],tgt=nodeMap3d[e.target];if(!src||!tgt)return;
      if(activeIds&&(!activeIds.has(e.source)||!activeIds.has(e.target)))return;
      const pos=e.line.geometry.attributes.position;
      pos.setXYZ(0,src.x,src.y,src.z);pos.setXYZ(1,tgt.x,tgt.y,tgt.z);pos.needsUpdate=true;
    });
    Object.entries(ringMap3d).forEach(([id,r])=>{const n=nodeMap3d[id];if(n)r.position.set(n.x,n.y,n.z);});
  }

  function resetHL3d(){
    selectedId3d=null;
    if(selRing3d)selRing3d.visible=false;
    Object.values(meshMap3d).forEach(m=>{if(!m.visible)return;const nd=nodeMap3d[m.userData.id];m.material.opacity=nd?.status==='none'?0.72:0.9;m.material.emissiveIntensity=nd?.status==='none'?0.12:0.35;});
    edgeMeshes3d.forEach(e=>{if(e.line.visible)e._mat.opacity=e._base;});
    Object.values(ringMap3d).forEach(r=>{if(r.visible)r.material.opacity=0.18;});
  }

  function referenceReveal(label, section) {
    document.querySelectorAll('.section[data-section]').forEach(div => {
      if (div.dataset.section === section) div.classList.remove('collapsed');
    });
    setTimeout(() => {
      const needle = label.trim().toLowerCase().replace(/^[-•]\s*/, '').slice(0, 20);
      let found = null;
      document.querySelectorAll('.node-label').forEach(lbl => {
        if (!found && lbl.textContent.trim().replace(/^[-•]\s*/, '').toLowerCase().startsWith(needle.slice(0, 15))) found = lbl;
      });
      if (found) {
        // Expand all ancestor tree-items so the node is visible
        let ancestor = found.closest('.tree-item');
        while (ancestor) {
          if (ancestor.classList.contains('collapsed')) {
            ancestor.classList.remove('collapsed');
            const tog = ancestor.querySelector(':scope > .node > .node-toggle');
            if (tog && !tog.classList.contains('leaf')) tog.textContent = '−';
            if (ancestor.dataset.key) EXPANDED.add(ancestor.dataset.key);
          }
          ancestor = ancestor.parentElement.closest('.tree-item');
        }
        found.scrollIntoView({ behavior: 'smooth', block: 'center' });
        found.style.background = 'rgba(232,255,71,0.15)';
        found.style.borderRadius = '3px';
        found.style.padding = '0 3px';
        setTimeout(() => { found.style.background = ''; found.style.padding = ''; }, 2500);
      }
    }, 150);
  }

  function selectNode3d(id){
    const nd3=nodeMap3d[id];
    if(nd3) { setSelectedNode(nd3.key||nd3.id, nd3.label, nd3.section); setTimeout(() => referenceReveal(nd3.label, nd3.section), 80); }
    const THREE=window.THREE;
    selectedId3d=id;
    // Show selection pulse ring on selected node
    if(selRing3d&&nd3){const sc=nd3._r*2.2;selRing3d.scale.set(sc,sc,sc);selRing3d.position.set(nd3.x,nd3.y,nd3.z);selRing3d.material.color.set(SECT_HEX3[nd3.section_idx]||0x888888);selRing3d.visible=true;}
    const connected=new Set([id]);
    const inE=[],outE=[];
    NET_EDGES.forEach(e=>{if(e.source===id){connected.add(e.target);outE.push(e);}if(e.target===id){connected.add(e.source);inE.push(e);}});
    Object.entries(meshMap3d).forEach(([nid,m])=>{
      if(!m.visible)return;
      if(nid===id){m.material.opacity=1.0;m.material.emissiveIntensity=0.8;}
      else if(connected.has(nid)){m.material.opacity=0.75;m.material.emissiveIntensity=0.4;}
      else{m.material.opacity=0.04;m.material.emissiveIntensity=0;}
    });
    Object.entries(ringMap3d).forEach(([nid,r])=>{if(!r.visible)return;r.material.opacity=nid===id?0.6:connected.has(nid)?0.3:0.04;});
    edgeMeshes3d.forEach(e=>{if(!e.line.visible)return;e._mat.opacity=(e.source===id||e.target===id)?0.8:0.01;});
    openDetail3d(nodeMap3d[id],inE,outE);
  }

    document.getElementById('g3dDetail').style.transform=isMobile3d()?'translateY(100%)':'translateX(100%)';

  function rebuildFilter3d(sf){
    statusFilter3d=sf;
    resetHL3d(); closeDetail3d();
    applyProg3d();
    const THREE=window.THREE;
    const netNds=NET_NODES.filter(n=>n.in_network);
    const active=netNds.filter(n=>sf==='all'||n.status===sf);
    const aIds=new Set(active.map(n=>n.id));
    const aEdges=NET_EDGES.filter(e=>aIds.has(e.source)&&aIds.has(e.target));
    const inn={},out={};
    active.forEach(n=>{inn[n.id]=0;out[n.id]=0;});
    aEdges.forEach(e=>{inn[e.target]=(inn[e.target]||0)+e.weight;out[e.source]=(out[e.source]||0)+e.weight;});
    active.forEach(n=>{n._in=inn[n.id]||0;n._out=out[n.id]||0;const di=n.depth===1?4:n.depth===2?2:1;n._w=n._in*1.5+n._out+di*2;n._r=Math.max(1.5,1.5+Math.sqrt(n._w)*4.2);});
    netNds.filter(n=>!aIds.has(n.id)).forEach(n=>{n._in=0;n._out=0;n._w=0;n._r=1.2;});
    netNds.forEach(n=>{
      const m=meshMap3d[n.id];if(!m)return;
      m.geometry.dispose();m.geometry=new THREE.SphereGeometry(n._r,14,14);
      if(aIds.has(n.id)){const col=nodeCol3d(n,THREE);m.material.color.copy(col);m.material.emissive.copy(col);m.material.emissiveIntensity=n.status==='none'?0.12:0.35;m.material.opacity=0.9;m.visible=true;}
      else{m.material.opacity=sf==='all'?0.06:0;m.visible=sf==='all';}
      const ring=ringMap3d[n.id];if(ring)ring.visible=aIds.has(n.id)&&showRings3d&&n._w>20;
    });
    edgeMeshes3d.forEach(e=>{const vis=aIds.has(e.source)&&aIds.has(e.target);e.line.visible=vis;e._base=vis?Math.min(0.06+e.weight*0.06,globalEdgeOpac):0;if(vis)e._mat.opacity=e._base;});
    if(sf!=='all'){
      const asn=simNodes3d.filter(n=>aIds.has(n.id));
      asn.forEach(n=>{const p=randSph3d(280);n.x=p[0];n.y=p[1];n.z=p[2];n.vx=0;n.vy=0;n.vz=0;const nd=nodeMap3d[n.id];if(nd){nd.x=n.x;nd.y=n.y;nd.z=n.z;}const m=meshMap3d[n.id];if(m)m.position.set(n.x,n.y,n.z);});
      syncEdges3d(aIds);
      if(window._g3dfsim)clearInterval(window._g3dfsim);
      let st=0;
      window._g3dfsim=setInterval(()=>{runForce3d(simNodes3d.filter(n=>aIds.has(n.id)),aEdges,4);syncEdges3d(aIds);st+=4;if(st>=140)clearInterval(window._g3dfsim);},16);
    }
    if(builtOut3d) applyBuiltOut3d();
  }

  function drawLabels3d(){
    const lc=document.getElementById('g3dLabelCanvas');
    if(!lc)return;
    const lctx=lc.getContext('2d');
    lctx.clearRect(0,0,lc.width,lc.height);
    const netNds=NET_NODES.filter(n=>n.in_network);
    const showFor=new Set();
    if(showTopLabels3d) [...netNds].sort((a,b)=>b._w-a._w).slice(0,15).forEach(n=>showFor.add(n.id));
    if(selectedId3d) showFor.add(selectedId3d);
    if(hoveredId3d)  showFor.add(hoveredId3d);
    const proj=new THREE.Vector3();
    const wrap=document.getElementById('g3dCanvas').parentElement;
    const W=wrap.clientWidth,H=wrap.clientHeight;
    showFor.forEach(id=>{
      const nd=nodeMap3d[id];if(!nd||!meshMap3d[id]?.visible)return;
      proj.set(nd.x,nd.y,nd.z);proj.applyMatrix4(pivot3d.matrixWorld);proj.project(camera3d);
      const sx=(proj.x+1)/2*W,sy=(-proj.y+1)/2*H;
      if(sx<0||sx>W||sy<0||sy>H)return;
      const isSel=id===selectedId3d,isHov=id===hoveredId3d;
      const col=SECT_CSS3[nd.section_idx]||'#888';
      const fs=isSel?13:isHov?12:10,alpha=isSel?1.0:isHov?0.9:0.55;
      lctx.save();
      lctx.font=`${isSel?600:400} ${fs}px 'Barlow Condensed',sans-serif`;
      lctx.globalAlpha=alpha;
      const tw=lctx.measureText(nd.label).width;
      const px=sx+nd._r*1.2+4,py=sy+4;
      lctx.fillStyle='rgba(14,16,21,0.75)';
      lctx.beginPath();
      if(lctx.roundRect) lctx.roundRect(px-3,py-fs+2,tw+8,fs+4,3);
      else lctx.rect(px-3,py-fs+2,tw+8,fs+4);
      lctx.fill();
      lctx.fillStyle=isSel||isHov?col:'rgba(160,170,190,0.85)';
      lctx.fillText(nd.label,px,py);
      lctx.restore();
    });
  }

  // Sync expand/collapse state from other views into 3D graph
  window.g3dSyncExpanded = function() {

    NET_NODES.filter(n => n.in_network).forEach(n => {
      const mesh = meshMap3d[n.id];

  return function() {
    const wrap=document.getElementById('g3dCanvas').parentElement;
    const W=wrap.clientWidth,H=wrap.clientHeight;
    if(!W||!H){setTimeout(initGraph3D,50);return;}

    if(!ready){
      const THREE=window.THREE;
      const canvas=document.getElementById('g3dCanvas');

      // Verify WebGL is available before committing — fail gracefully
      let testRenderer;
      try { testRenderer=new THREE.WebGLRenderer({canvas,antialias:true}); } catch(e) { testRenderer=null; }
      if(!testRenderer||!testRenderer.getContext()){
        if(testRenderer) testRenderer.dispose();
        const view=document.getElementById('graph3dView');
        if(view) view.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#4a5568;font-family:\'DM Mono\',monospace;font-size:13px;letter-spacing:1px;">3D GRAPH REQUIRES WEBGL — NOT AVAILABLE IN THIS ENVIRONMENT</div>';
        return;
      }

      // WebGL confirmed — lock in and proceed
      ready=true;
      canvas.addEventListener('webglcontextlost',e=>{e.preventDefault();ready=false;},false);

      const g3dLeg=document.getElementById('g3dLegend');
      if(g3dLeg) g3dLeg.innerHTML=SECTIONS.map((s,i)=>`<div style="display:flex;align-items:center;gap:5px;"><span style="width:6px;height:6px;border-radius:50%;background:${SECT_CSS3[i]||s.color};display:inline-block;"></span><span>${s.title.split(' ').slice(0,3).join(' ')}</span></div>`).join('');
      const lc=document.getElementById('g3dLabelCanvas');
      lc.width=W;lc.height=H;

      scene3d=new THREE.Scene();scene3d.background=new THREE.Color(0x0e1015);
      camera3d=new THREE.PerspectiveCamera(55,W/H,1,6000);camera3d.position.z=800;
      renderer3d=testRenderer;
      renderer3d.setPixelRatio(Math.min(devicePixelRatio,2));renderer3d.setSize(W,H);
      scene3d.add(new THREE.AmbientLight(0x1a2035,8));
      const dl=new THREE.DirectionalLight(0x8899bb,1.5);dl.position.set(2,3,1);scene3d.add(dl);
      pivot3d=new THREE.Group();scene3d.add(pivot3d);

      // Selection pulse ring — one shared ring, repositioned per selection
      selRing3d=new THREE.Mesh(new THREE.TorusGeometry(1,0.6,8,48),new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0,side:THREE.DoubleSide}));
      selRing3d.visible=false;pivot3d.add(selRing3d);

      applyProg3d();
      const netNds=NET_NODES.filter(n=>n.in_network);
      computeW3d(netNds,NET_EDGES);
      const maxW3=Math.max(...netNds.map(n=>n._w));

      netNds.forEach(n=>{
        const p=randSph3d(340);n.x=p[0];n.y=p[1];n.z=p[2];
        const col=nodeCol3d(n,THREE);
        const mat=new THREE.MeshPhongMaterial({color:col.clone(),emissive:col.clone(),emissiveIntensity:n.status==='none'?0.12:0.35,shininess:120,transparent:true,opacity:0.9});
        const mesh=new THREE.Mesh(new THREE.SphereGeometry(n._r,14,14),mat);
        mesh.position.set(n.x,n.y,n.z);mesh.userData={id:n.id};pivot3d.add(mesh);meshMap3d[n.id]=mesh;
        if(n._w>maxW3*0.5){
          const rmat=new THREE.MeshBasicMaterial({color:col.clone(),transparent:true,opacity:0.18,side:THREE.DoubleSide});
          const ring=new THREE.Mesh(new THREE.TorusGeometry(n._r*1.55,0.5,6,32),rmat);
          ring.userData={nodeId:n.id};pivot3d.add(ring);ringMap3d[n.id]=ring;
        }
        const sn={id:n.id,x:n.x,y:n.y,z:n.z,vx:0,vy:0,vz:0};
        simNodes3d.push(sn);simByID3d[n.id]=sn;
      });

      NET_EDGES.forEach(e=>{
        const src=nodeMap3d[e.source],tgt=nodeMap3d[e.target];if(!src||!tgt)return;
        const cs=new THREE.Color(SECT_HEX3[src.section_idx]||0x334466);
        cs.lerp(new THREE.Color(SECT_HEX3[tgt.section_idx]||0x334466),0.5).multiplyScalar(0.65);
        const base=Math.min(0.06+e.weight*0.06,globalEdgeOpac);
        const mat=new THREE.LineBasicMaterial({color:cs,transparent:true,opacity:base});
        const geo=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0),new THREE.Vector3(1,1,1)]);
        const line=new THREE.Line(geo,mat);pivot3d.add(line);
        edgeMeshes3d.push({line,source:e.source,target:e.target,weight:e.weight,_mat:mat,_base:base});
      });

      // Initial force sim
      let initSt=0;
      const initSim=setInterval(()=>{runForce3d(simNodes3d,NET_EDGES,4);syncEdges3d(null);initSt+=4;if(initSt>=160)clearInterval(initSim);},16);

      // Camera controls
      let downX=0,downY=0,isDrag=false;
      canvas.addEventListener('mousedown',e=>{downX=e.clientX;downY=e.clientY;isDrag=false;});
      canvas.addEventListener('mousemove',e=>{
        if(e.buttons){if(Math.abs(e.clientX-downX)>3||Math.abs(e.clientY-downY)>3)isDrag=true;tRY+=(e.clientX-downX)*0.004;tRX+=(e.clientY-downY)*0.004;downX=e.clientX;downY=e.clientY;}
        else{
          const rect=wrap.getBoundingClientRect(),mx=((e.clientX-rect.left)/rect.width)*2-1,my=-((e.clientY-rect.top)/rect.height)*2+1;
          camera3d.updateMatrixWorld();
          const ray=new THREE.Raycaster();ray.setFromCamera({x:mx,y:my},camera3d);
          const vis=Object.values(meshMap3d).filter(m=>m.visible&&m.material.opacity>0.25);
          const hits=ray.intersectObjects(vis);
          const tip=document.getElementById('g3dTooltip');
          if(hits.length){
            const nd=nodeMap3d[hits[0].object.userData.id];if(!nd){tip.style.display='none';canvas.style.cursor='default';return;}
            hoveredId3d=nd.id;
            const col=SECT_CSS3[nd.section_idx]||'#888';
            const si=nd.status==='learned'?'<span style="color:#e8ff47"> ✓</span>':nd.status==='drilling'?'<span style="color:#47c8ff"> ⟳</span>':'';
            tip.innerHTML=`<span style="color:${col};font-family:Barlow Condensed,monospace;font-weight:600;">${nd.label}</span>${si}`;
            const r2=wrap.getBoundingClientRect();
            tip.style.display='block';tip.style.left=(e.clientX-r2.left+14)+'px';tip.style.top=(e.clientY-r2.top-10)+'px';
            canvas.style.cursor='pointer';
          } else {hoveredId3d=null;tip.style.display='none';canvas.style.cursor='default';}
        }
      });
      canvas.addEventListener('mouseup',e=>{
        if(isDrag)return;
        const rect=wrap.getBoundingClientRect(),mx=((e.clientX-rect.left)/rect.width)*2-1,my=-((e.clientY-rect.top)/rect.height)*2+1;
        camera3d.updateMatrixWorld();
        const ray=new THREE.Raycaster();ray.setFromCamera({x:mx,y:my},camera3d);
        const vis=Object.values(meshMap3d).filter(m=>m.visible&&m.material.opacity>0.25);
        const hits=ray.intersectObjects(vis);
        if(!hits.length){resetHL3d();closeDetail3d();return;}
        const id=hits[0].object.userData.id;
        if(id===selectedId3d){resetHL3d();closeDetail3d();return;}
        selectNode3d(id);
      });
      canvas.addEventListener('wheel',e=>{e.preventDefault();tZ3d=Math.min(2200,Math.max(80,tZ3d+e.deltaY*0.8));},{passive:false});
      canvas.addEventListener('mouseleave',()=>{hoveredId3d=null;document.getElementById('g3dTooltip').style.display='none';});

      // Touch controls (mobile: single-finger drag to rotate, tap to select)
      let touchX=0,touchY=0,isTouchDrag=false;
      canvas.addEventListener('touchstart',e=>{if(e.touches.length!==1)return;const t=e.touches[0];touchX=t.clientX;touchY=t.clientY;isTouchDrag=false;},{passive:true});
      canvas.addEventListener('touchmove',e=>{if(e.touches.length!==1)return;e.preventDefault();const t=e.touches[0];if(Math.abs(t.clientX-touchX)>3||Math.abs(t.clientY-touchY)>3)isTouchDrag=true;tRY+=(t.clientX-touchX)*0.004;tRX+=(t.clientY-touchY)*0.004;touchX=t.clientX;touchY=t.clientY;},{passive:false});
      canvas.addEventListener('touchend',e=>{if(isTouchDrag)return;const t=e.changedTouches[0];const rect=wrap.getBoundingClientRect(),mx=((t.clientX-rect.left)/rect.width)*2-1,my=-((t.clientY-rect.top)/rect.height)*2+1;camera3d.updateMatrixWorld();const ray=new THREE.Raycaster();ray.setFromCamera({x:mx,y:my},camera3d);const vis=Object.values(meshMap3d).filter(m=>m.visible&&m.material.opacity>0.25);const hits=ray.intersectObjects(vis);if(!hits.length){resetHL3d();closeDetail3d();return;}const id=hits[0].object.userData.id;if(id===selectedId3d){resetHL3d();closeDetail3d();return;}selectNode3d(id);});

      // Shared filter applier — keeps top + bottom toolbars in sync
      function applyG3dFilter(sf){
        // Sync bottom toolbar
        document.querySelectorAll('.g3d-tb-btn[data-status]').forEach(b=>b.classList.toggle('active',b.dataset.status===sf));
        // Sync top toolbar
        document.querySelectorAll('[data-g3dtop]').forEach(b=>b.classList.toggle('active',b.dataset.g3dtop===sf));
        rebuildFilter3d(sf);
      }
      // Bottom toolbar filter buttons
      document.querySelectorAll('.g3d-tb-btn[data-status]').forEach(btn=>{
        btn.addEventListener('click',function(){ applyG3dFilter(this.dataset.status); });
      });
      // Top toolbar filter buttons
      document.querySelectorAll('[data-g3dtop]').forEach(btn=>{
        btn.addEventListener('click',function(){ applyG3dFilter(this.dataset.g3dtop); });
      });
      document.getElementById('g3dCollapseAll').addEventListener('click',()=>{EXPANDED.clear();if(window.cmSyncExpanded)window.cmSyncExpanded();if(window.refSyncExpanded)window.refSyncExpanded();if(window.g3dSyncExpanded)window.g3dSyncExpanded();});
      document.getElementById('g3dCollapseAllTop').addEventListener('click',()=>{EXPANDED.clear();if(window.cmSyncExpanded)window.cmSyncExpanded();if(window.refSyncExpanded)window.refSyncExpanded();if(window.g3dSyncExpanded)window.g3dSyncExpanded();});
      document.getElementById('g3dExpandAllTop').addEventListener('click',()=>{const addAll=(nd,pk)=>{const k=makePathKey(pk,nd.t);if(nd.c&&nd.c.length){EXPANDED.add(k);nd.c.forEach(c=>addAll(c,k));}};SECTIONS.forEach(s=>{const sk=makeKey(s.title,s.title);EXPANDED.add(sk);s.nodes.forEach(n=>addAll(n,sk));});if(window.cmSyncExpanded)window.cmSyncExpanded();if(window.refSyncExpanded)window.refSyncExpanded();if(window.g3dSyncExpanded)window.g3dSyncExpanded();});
      document.getElementById('g3dExpandAll').addEventListener('click',()=>{const addAll=(nd,pk)=>{const k=makePathKey(pk,nd.t);if(nd.c&&nd.c.length){EXPANDED.add(k);nd.c.forEach(c=>addAll(c,k));}};SECTIONS.forEach(s=>{const sk=makeKey(s.title,s.title);EXPANDED.add(sk);s.nodes.forEach(n=>addAll(n,sk));});if(window.cmSyncExpanded)window.cmSyncExpanded();if(window.refSyncExpanded)window.refSyncExpanded();if(window.g3dSyncExpanded)window.g3dSyncExpanded();});
      document.getElementById('g3dReset').addEventListener('click',()=>{tRX=0;tRY=0;tZ3d=800;resetHL3d();closeDetail3d();});
      document.getElementById('g3dDetailClose').addEventListener('click',()=>{resetHL3d();closeDetail3d();});

      // Options
      const optPanel=document.getElementById('g3dOptions');
      document.getElementById('g3dOptionsBtn').addEventListener('click',()=>{optPanel.style.display=optPanel.style.display==='block'?'none':'block';});
      document.getElementById('g3dOptRings').addEventListener('change',function(){showRings3d=this.checked;Object.values(ringMap3d).forEach(r=>{r.visible=showRings3d;});});
      document.getElementById('g3dOptLabels').addEventListener('change',function(){showTopLabels3d=this.checked;});
      document.getElementById('g3dOptRotate').addEventListener('change',function(){autoRotate3d=this.checked;});
      document.getElementById('g3dOptHubOnly').addEventListener('change',function(){
        hubOnly3d=this.checked;
        const netNds=NET_NODES.filter(n=>n.in_network);
        netNds.forEach(n=>{const m=meshMap3d[n.id];if(!m||!m.visible)return;m.material.opacity=hubOnly3d&&n._w<hubThresh3d?0.04:(n.status==='none'?0.72:0.9);});
      });
      function applyBuiltOut3d(){
        const boMap=new Map();
        document.querySelectorAll('.tree-item').forEach(li=>boMap.set(li.dataset.key,li.dataset.builtout));
        const netNds=NET_NODES.filter(n=>n.in_network);
        netNds.forEach(n=>{const m=meshMap3d[n.id];if(!m||!m.visible)return;m.material.opacity=builtOut3d&&boMap.get(n.key)!=='1'?0.04:(n.status==='none'?0.72:0.9);});
      }
      const boCheckbox=document.getElementById('g3dOptBuiltOut');
      const boBtn=document.getElementById('g3dBuiltOutBtn');
      boCheckbox.addEventListener('change',function(){
        builtOut3d=this.checked;
        boBtn.classList.toggle('active',builtOut3d);
        applyBuiltOut3d();
      });
      boBtn.addEventListener('click',function(){
        builtOut3d=!builtOut3d;
        boCheckbox.checked=builtOut3d;
        this.classList.toggle('active',builtOut3d);
        applyBuiltOut3d();
      });
      document.getElementById('g3dOptEdge').addEventListener('input',function(){
        globalEdgeOpac=this.value/100;
        document.getElementById('g3dOptEdgeVal').textContent=this.value+'%';
        edgeMeshes3d.forEach(e=>{e._base=Math.min(0.06+e.weight*0.06,globalEdgeOpac);if(e.line.visible&&!selectedId3d)e._mat.opacity=e._base;});
      });

      // Search (debounced 200ms)
      let _g3dSearchTimer;
      document.getElementById('g3dSearch').addEventListener('input',function(){
        const self=this;
        clearTimeout(_g3dSearchTimer);
        _g3dSearchTimer=setTimeout(function(){
        const q=self.value.toLowerCase().trim();
        const netNds=NET_NODES.filter(n=>n.in_network);
        if(!q){resetHL3d();return;}
        const matches=netNds.filter(n=>n.label.toLowerCase().includes(q));
        if(matches.length===1){selectedId3d=null;selectNode3d(matches[0].id);}
        else{const mids=new Set(matches.map(n=>n.id));Object.entries(meshMap3d).forEach(([id,m])=>{if(!m.visible)return;m.material.opacity=mids.has(id)?1.0:0.04;});edgeMeshes3d.forEach(e=>{if(e.line.visible)e._mat.opacity=0.005;});}
        },200);
      });

      // Render loop
      (function loop(){
        requestAnimationFrame(loop);
        rotX+=(tRX-rotX)*0.08;rotY+=(tRY-rotY)*0.08;zoom3d+=(tZ3d-zoom3d)*0.08;
        pivot3d.rotation.x=rotX;pivot3d.rotation.y=rotY;camera3d.position.z=zoom3d;
        if(autoRotate3d)tRY+=0.00018;
        // Animate selection pulse ring
        if(selRing3d&&selRing3d.visible){const t=Date.now()*0.003;selRing3d.material.opacity=0.35+0.25*Math.sin(t);selRing3d.quaternion.copy(camera3d.quaternion);const snd=nodeMap3d[selectedId3d];if(snd)selRing3d.position.set(snd.x,snd.y,snd.z);}
        Object.values(ringMap3d).forEach(r=>{if(r.visible)r.quaternion.copy(camera3d.quaternion);});
        renderer3d.render(scene3d,camera3d);
        drawLabels3d();
      })();

      window.addEventListener('resize',()=>{
        const r=wrap.getBoundingClientRect();
        renderer3d.setSize(r.width,r.height);camera3d.aspect=r.width/r.height;camera3d.updateProjectionMatrix();
        lc.width=r.width;lc.height=r.height;
      });
    } else {
      applyProg3d();
      rebuildFilter3d(statusFilter3d);
      // Re-apply highlight for currently selected node (rebuildFilter3d resets it)
      if(SELECTED_NODE && SELECTED_NODE.label) {
        setTimeout(() => { if(window._g3dHighlightByLabel) window._g3dHighlightByLabel(SELECTED_NODE.label); }, 50);
      }
      const r=wrap.getBoundingClientRect();
      renderer3d.setSize(r.width,r.height);camera3d.aspect=r.width/r.height;camera3d.updateProjectionMatrix();
    }
  };
})();


document.addEventListener('keydown', e => {
  if (e.key === 'g' && !e.target.matches('input, textarea, [contenteditable]')) {
    const cur = document.querySelector('.view-tab.active')?.dataset.view;
    switchToTab(cur === 'graph3d' ? 'reference' : 'graph3d');
  }
});
loadState();
buildSections();
markBuiltOut();
updateStats();
</script>

<!-- ══ DIAGNOSTICS SCRIPT ═════════════════════════════════════════════════ -->
<script>
(function(){
  const diagErrors = [];
  const prevOnError = window.onerror;
  window.onerror = function(msg, src, line, col, err) {
    diagErrors.push({ ts: new Date().toLocaleTimeString(), msg, src, line, col, stack: err && err.stack || '' });
    if (diagErrors.length > 50) diagErrors.shift();
    if (prevOnError) return prevOnError.apply(this, arguments);
  };
  window.addEventListener('unhandledrejection', function(e) {
    const r = e.reason;
    diagErrors.push({ ts: new Date().toLocaleTimeString(), msg: 'Unhandled rejection: ' + (r && r.message || r), stack: r && r.stack || '' });
    if (diagErrors.length > 50) diagErrors.shift();
  });

  function h(s) { return String(s).replace(/&/g,'&amp;').replace(/\x3c/g,'&lt;').replace(/>/g,'&gt;'); }

  function countLeafTechniques() {
    let count = 0;
    document.querySelectorAll('.tree-item').forEach(function(li) {
      if (li.dataset.schema === '0' && li.querySelector(':scope > .node > .node-toggle.leaf')) count++;
    });
    return count;
  }

  function countPositions() {
    if (typeof SECTIONS==='undefined') return 0;
    let c = 0;
    SECTIONS.forEach(function(s) { c += s.nodes ? s.nodes.length : 0; });
    return c;
  }

  function getParseWarnings() {
    var warnings = [];
    if (typeof SECTIONS==='undefined') return warnings;
    var allLabels = new Set();
    function collectLabels(nodes) {
      if (!nodes) return;
      nodes.forEach(function(n) { if (n.t) allLabels.add(n.t.trim().toLowerCase()); if (n.c) collectLabels(n.c); });
    }
    SECTIONS.forEach(function(s) { collectLabels(s.nodes); });

    function walk(nodes, path) {
      if (!nodes) return;
      nodes.forEach(function(n) {
        var cur = path + ' > ' + (n.t || '(empty)');
        if (!n.t || n.t.trim() === '') warnings.push('Empty node text at: ' + path);
        if (n.t && n.t.includes('\u2192')) {
          var parts = n.t.split('\u2192');
          if (parts.length !== 2 || !parts[0].trim() || !parts[1].trim()) {
            warnings.push('Malformed transition: ' + h(n.t) + ' at ' + h(path));
          }
        }
        if (n.c) walk(n.c, cur);
      });
    }
    SECTIONS.forEach(function(s) { walk(s.nodes, s.title); });
    return warnings.slice(-10);
  }

  function getDupKeys() {
    var counts = {};
    document.querySelectorAll('.tree-item[data-key]').forEach(function(li) {
      var k = li.dataset.key;
      counts[k] = (counts[k] || 0) + 1;
    });
    var dups = [];
    var total = 0;
    for (var k in counts) {
      if (counts[k] > 1) { total++; if (dups.length < 5) dups.push(k + ' (' + counts[k] + 'x)'); }
    }
    return { total: total, samples: dups };
  }

  function testRevealLookup() {
    if (typeof SELECTED_NODE === 'undefined' || !SELECTED_NODE || !SELECTED_NODE.label) return { found: false, reason: 'No node selected' };
    var needle = SELECTED_NODE.label.trim().toLowerCase().replace(/^[-\u2022]\s*/, '').slice(0, 20);
    var found = null;
    document.querySelectorAll('.node-label').forEach(function(lbl) {
      if (!found && lbl.textContent.trim().replace(/^[-\u2022]\s*/, '').toLowerCase().startsWith(needle.slice(0, 15))) found = lbl;
    });
    if (found) {
      var path = [];
      var anc = found.closest('.tree-item');
      while (anc) { var l = anc.querySelector(':scope > .node > .node-label'); if (l) path.unshift(l.textContent.trim().slice(0, 25)); anc = anc.parentElement.closest('.tree-item'); }
      return { found: true, matched: found.textContent.trim().slice(0, 50), path: path.join(' > ') };
    }
    return { found: false, reason: 'No DOM match for: ' + needle };
  }

  function diagRefresh() {
    var el;
    // SECTIONS
    el = document.getElementById('diagSections');
    if (el) {
      var secCount = typeof SECTIONS!=='undefined' ? SECTIONS.length : 0;
      var posCount = countPositions();
      var techCount = countLeafTechniques();
      el.innerHTML = '<div class="diag-label">Sections</div>' +
        '<div class="diag-val">Sections: ' + secCount + '</div>' +
        '<div class="diag-val">Positions (top-level): ' + posCount + '</div>' +
        '<div class="diag-val">Leaf techniques: ' + techCount + '</div>' +
        '<div class="diag-val">Total tree items: ' + document.querySelectorAll('.tree-item').length + '</div>';
    }
    // Graph
    el = document.getElementById('diagGraph');
    if (el) {
      var net = window._diagNet;
      if (net) {
        el.innerHTML = '<div class="diag-label">3D Graph</div>' +
          '<div class="diag-val">Nodes: ' + net.nodeCount + '</div>' +
          '<div class="diag-val">Edges: ' + net.edgeCount + '</div>' +
          '<div class="diag-val">In-network: ' + (net.nodes ? net.nodes.filter(function(n){return n.in_network;}).length : '?') + '</div>';
      } else {
        el.innerHTML = '<div class="diag-label">3D Graph</div><div class="diag-val" style="color:#4a5568;">Not initialized</div>';
      }
    }
    // Selected
    el = document.getElementById('diagSelected');
    if (el) {
      var s = (typeof SELECTED_NODE !== 'undefined') ? SELECTED_NODE : null;
      if (s) {
        el.innerHTML = '<div class="diag-label">Selected Node</div>' +
          '<div class="diag-val">Label: ' + h(s.label || '') + '</div>' +
          '<div class="diag-val">Section: ' + h(s.section || '') + '</div>' +
          '<div class="diag-val" style="word-break:break-all;">Key: ' + h((s.key || '').slice(0, 80)) + '</div>';
      } else {
        el.innerHTML = '<div class="diag-label">Selected Node</div><div class="diag-val" style="color:#4a5568;">None</div>';
      }
    }
    // Reveal test
    el = document.getElementById('diagReveal');
    if (el) {
      var r = testRevealLookup();
      if (r.found) {
        el.innerHTML = '<div class="diag-label">referenceReveal Lookup</div>' +
          '<div class="diag-val" style="color:#3abfaa;">Found: ' + h(r.matched) + '</div>' +
          '<div class="diag-val" style="word-break:break-all;">Path: ' + h(r.path) + '</div>';
      } else {
        el.innerHTML = '<div class="diag-label">referenceReveal Lookup</div>' +
          '<div class="diag-val" style="color:#4a5568;">' + h(r.reason) + '</div>';
      }
    }
    // Dup keys
    el = document.getElementById('diagKeys');
    if (el) {
      var dk = getDupKeys();
      el.innerHTML = '<div class="diag-label">Duplicate Keys</div>' +
        '<div class="diag-val">Collisions: ' + dk.total + '</div>' +
        (dk.samples.length ? dk.samples.map(function(s){ return '<div class="diag-warn">' + h(s) + '</div>'; }).join('') : '');
    }
    // Parse warnings
    el = document.getElementById('diagWarnings');
    if (el) {
      var w = getParseWarnings();
      el.innerHTML = '<div class="diag-label">Parse Warnings (last 10)</div>' +
        (w.length ? w.map(function(s){ return '<div class="diag-warn">' + h(s) + '</div>'; }).join('') : '<div class="diag-val" style="color:#4a5568;">None</div>');
    }
    // Errors
    el = document.getElementById('diagErrors');
    if (el) {
      var last10 = diagErrors.slice(-10);
      el.innerHTML = '<div class="diag-label">Runtime Errors (last 10)</div>' +
        (last10.length ? last10.map(function(e){ return '<div class="diag-err">[' + e.ts + '] ' + h(e.msg) + (e.line ? ' (L' + e.line + ')' : '') + (e.stack ? '\n' + h(e.stack.split('\n').slice(0,3).join('\n')) : '') + '</div>'; }).join('') : '<div class="diag-val" style="color:#4a5568;">None</div>');
    }
  }

  var panel = document.getElementById('diagPanel');
  var toggle = document.getElementById('diagToggle');
  var close = document.getElementById('diagClose');
  if (toggle) toggle.addEventListener('click', function() {
    if (panel.style.display === 'none') { panel.style.display = 'block'; diagRefresh(); } else { panel.style.display = 'none'; }
  });
  if (close) close.addEventListener('click', function() { panel.style.display = 'none'; });
})();
</script>
</body>
